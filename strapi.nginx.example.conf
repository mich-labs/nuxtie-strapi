server {
    listen 80;
    listen [::]:80;

    server_name strapi.link;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate /etc/letsencrypt/live/strapi.link/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/strapi.link/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # optional for mapper
    if ($block_scanners) {
        return 444;
    }

    location / {
        proxy_pass http://nuxtie-strapi:1337;

        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass_request_headers on;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # location for certbot
    location /.well-known/acme-challenge/ {
        proxy_pass http://172.17.0.1:5555;
        proxy_set_header Host $host;
    }

}
